        <style>
            body {
                background-color: #f9f6f0;
                position: relative;
                overflow-x: hidden;
            }
            .paper-texture::before {
                content: "";
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                opacity: 0.03;
                pointer-events: none;
                background-image: url(https://www.transparenttextures.com/patterns/natural-paper.png);
                z-index: 10;
            }
            .bg-nostalgia {
                background-image:
                    linear-gradient(
                        rgba(249, 246, 240, 0.92),
                        rgba(249, 246, 240, 0.92)
                    ),
                    url(https://lh3.googleusercontent.com/aida-public/AB6AXuAJwlbyLJjXsDFilkyqK9_z7XuhoDVeOx6hAjf-EOGsRIab5q61s1PclLnhsU3nY5x-efREXWsZ1I3AhQBid22V9ZaOixFcVz3bTFVnI_PXoCaTfC0jGoAsoah2tPhEUB1o3xGv-0orxq0UtGXmYDW_DXnK5L2hPIlqHqzM9GXCvJ-Vb2ZOIN-63W1neL6_MN_0BS7F7hq-MCH1GkuDC5y3rNkR2f8YKsyW5dD4MCJN-ZVJoWDeqQz7XEFrqocXnvzjCd8Q-G5Iny8E);
                background-size: cover;
                background-position: center;
                background-attachment: fixed;
            }
            .login-card {
                background: rgba(255, 255, 255, 0.95);
                backdrop-filter: blur(8px);
                border: 1px solid #e4e2e2;
                box-shadow: 0 10px 40px -10px rgba(26, 46, 68, 0.08);
            }
            .input-underline {
                border: none;
                border-bottom: 1px solid #74777d;
                background: transparent;
                transition: all 0.3s ease;
            }
            .input-underline:focus {
                border-bottom: 2px solid #735c00;
                box-shadow: none;
                outline: none;
            }
            .btn-hover-lift {
                transition:
                    transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1),
                    box-shadow 0.2s ease;
            }
            .btn-hover-lift:hover {
                transform: translatey(-2px);
                box-shadow: 0 4px 12px rgba(115, 92, 0, 0.2);
            }
            .material-symbols-outlined {
                font-variation-settings:
                    "FILL" 0,

                vertical-align: middle;

    <body
        class="font-body-md text-on-surface paper-texture min-h-screen flex flex-col bg-nostalgia"
        data-alt="Seputar kenangan SMA dalam nuansa sepia yang hangat, memperlihatkan siswa tertawa di kelas dengan cahaya keemasan."
    >
        <!-- TopAppBar -->
        <header
            class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 py-4 bg-transparent"
        >
            <div class="flex items-center gap-2"></div>
            <nav class="hidden md:flex items-center gap-8">
                <a
                    class="text-on-surface-variant hover:text-primary transition-colors font-label-sm uppercase tracking-widest"
                    href="{{DATA:SCREEN:SCREEN_5}}"
                    >HOME</a
                ><a
                    class="text-on-surface-variant hover:text-primary transition-colors font-label-sm uppercase tracking-widest"
                    href="{{DATA:SCREEN:SCREEN_2}}"
                    >GALLERY</a
                >
            </nav>
            <div class="flex items-center gap-4">
                <button
                    class="text-primary hover:text-secondary transition-colors"
                ></button>
            </div>
        </header>
        <main
            class="flex-grow flex items-center justify-center pt-24 pb-12 px-4"
        >
            <div
                class="w-full max-w-md login-card rounded-xl p-10 relative overflow-hidden"
                style="transform: translate(4.91406px, 4.52438px)"
            >
                <!-- Decorative border accent -->
                <div
                    class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-primary via-secondary to-primary"
                ></div>
                <div class="text-center mb-10">
                    <h1
                        class="font-headline-md text-headline-md text-primary mb-2"
                    >
                        Login Admin
                    </h1>
                </div>
                <form
                    action="{{DATA:SCREEN:SCREEN_7}}"
                    class="space-y-8"
                    method="POST"
                >
                    <div class="relative">
                        <label
                            class="block font-label-sm text-primary mb-1 uppercase tracking-tighter"
                            for="username"
                            >USERNAME</label
                        >
                        <div class="relative group">
                            <input
                                class="w-full input-underline py-2 pr-10 text-primary placeholder:text-outline-variant focus:placeholder:opacity-0"
                                id="username"
                                name="username"
                                placeholder="ID Admin"
                                required=""
                                type="text"
                            />
                            <span
                                class="material-symbols-outlined absolute right-0 bottom-2 text-outline-variant group-focus-within:text-secondary"
                                >person</span
                            >
                        </div>
                    </div>
                    <div class="relative">
                        <label
                            class="block font-label-sm text-primary mb-1 uppercase tracking-tighter"
                            for="password"
                            >PASSWORD</label
                        >
                        <div class="relative group">
                            <input
                                class="w-full input-underline py-2 pr-10 text-primary placeholder:text-outline-variant focus:placeholder:opacity-0"
                                id="password"
                                name="password"
                                placeholder="••••••••"
                                required=""
                                type="password"
                            />
                            <span
                                class="material-symbols-outlined absolute right-0 bottom-2 text-outline-variant group-focus-within:text-secondary"
                                >lock</span
                            >
                        </div>
                    </div>
                    <div class="flex items-center justify-between">
                        <label
                            class="flex items-center gap-2 cursor-pointer group"
                        >
                            <input
                                class="rounded-sm border-outline text-secondary focus:ring-secondary/20"
                                type="checkbox"
                            />
                            <span
                                class="font-label-sm text-on-surface-variant group-hover:text-primary transition-colors"
                                >Ingat perangkat</span
                            >
                        </label>
                    </div>
                    <div class="pt-4">
                        <button
                            class="w-full bg-secondary text-on-secondary-fixed py-4 rounded-lg font-label-sm uppercase tracking-widest btn-hover-lift flex items-center justify-center gap-2"
                            type="submit"
                        >
                            MASUK KE ARSIP
                            <span class="material-symbols-outlined text-[18px]"
                                >arrow_forward</span
                            >
                        </button>
                    </div>
                </form>
                <div
                    class="mt-10 pt-6 border-t border-surface-variant text-center"
                >
                    <a
                        class="inline-flex items-center gap-2 font-label-sm text-on-surface-variant hover:text-primary transition-colors group"
                        href="{{DATA:SCREEN:SCREEN_5}}"
                    >
                        <span
                            class="material-symbols-outlined text-[16px] group-hover:-translate-x-1 transition-transform"
                            >keyboard_backspace</span
                        >
                        Kembali ke Beranda
                    </a>
                </div>
            </div>
        </main>
        <!-- Footer -->
        <footer
            class="w-full max-w-7xl mx-auto px-8 py-10 flex flex-col md:flex-row justify-between items-center gap-4 text-on-surface-variant"
        >
            <div class="flex flex-col items-center md:items-start gap-1"></div>
            <div class="flex items-center gap-8"></div>
            <div class="flex items-center gap-4">
                <button
                    class="w-10 h-10 rounded-full border border-outline-variant flex items-center justify-center hover:bg-surface-container-high transition-colors"
                >
                    <span class="material-symbols-outlined text-[20px]"
                        >share</span
                    >
                </button>
            </div>
        </footer>
        <!-- Interactive Atmospheric Effect -->
        <script>
            document.addEventListener("mousemove", (e) => {
                const x = e.clientX / window.innerWidth;
                const y = e.clientY / window.innerHeight;

                const card = document.querySelector(".login-card");
                if (card) {
                    const moveX = (x - 0.5) * 10;
                    const moveY = (y - 0.5) * 10;
                    card.style.transform = `translate(${moveX}px, ${moveY}px)`;
                }
            });
        </script>
    </body>
</html>
